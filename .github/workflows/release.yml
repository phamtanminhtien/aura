name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    name: Build binaries
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            target: aarch64-apple-darwin
            artifact_name: aura-macos-aarch64
            bin_path: target/release/aura
          # - os: ubuntu-latest
          #   target: x86_64-unknown-linux-gnu
          #   artifact_name: aura-linux-x86_64
          #   bin_path: target/release/aura
          # - os: windows-latest
          #   target: x86_64-pc-windows-msvc
          #   artifact_name: aura-windows-x86_64.exe
          #   bin_path: target/release/aura.exe

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Build release binary
        run: cargo build --release

      - name: Package artifact
        run: |
          mkdir -p dist pkg
          rm -rf pkg/*

          # Keep the legacy "raw binary" asset name.
          cp "${{ matrix.bin_path }}" "dist/${{ matrix.artifact_name }}"

          # Create an archive that includes stdlib/ alongside the binary.
          cp "${{ matrix.bin_path }}" "pkg/aura"
          cp -R "stdlib" "pkg/stdlib"
          tar -czf "dist/${{ matrix.artifact_name }}.tar.gz" -C pkg aura stdlib

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: dist/*
          if-no-files-found: error

  release:
    name: GitHub Release
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
