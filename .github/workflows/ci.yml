name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - name: format
        run: cargo fmt --all -- --check

      - name: lint
        run: cargo clippy -- -D warnings

      - name: test
        run: cargo test