name: CI

on:
  pull_request:
    branches: [main]
    paths:
      - "src/**"
      - "stdlib/**"
      - "tests/**"
      - "scripts/**"
      - "Cargo.toml"
      - "Cargo.lock"
      - ".github/workflows/**"

jobs:
  check-test-native:
    runs-on: ${{ matrix.os }}

    strategy:
      matrix:
        # ubuntu-latest
        os: [macos-latest]
        include:
          - os: macos-latest
            target: aarch64-apple-darwin
          # - os: ubuntu-latest
          #   target: x86_64-unknown-linux-gnu
          # - os: windows-latest
          #   target: x86_64-pc-windows-msvc

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - name: format
        run: cargo fmt --all -- --check

      - name: lint
        run: cargo clippy -- -A warnings

      - name: lib tests
        run: cargo test --lib

      - name: e2e tests
        run: cargo test --test e2e -- interp compiler

  test-wasm:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Install wasm-pack
        run: curl https://rustwasm.github.io/wasm-pack/installer/init.sh -sSf | sh

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Run WASM tests
        run: ./scripts/test-wasm.sh
