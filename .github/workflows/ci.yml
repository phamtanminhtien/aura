name: CI

on:
  pull_request:
    branches: [master]

jobs:
  test:
    runs-on: ${{ matrix.os }}

    strategy:
      matrix:
        # ubuntu-latest
        os: [macos-latest]
        include:
          - os: macos-latest
            target: aarch64-apple-darwin
          # - os: ubuntu-latest
          #   target: x86_64-unknown-linux-gnu
          # - os: windows-latest
          #   target: x86_64-pc-windows-msvc

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - name: format
        run: cargo fmt --all -- --check

      - name: lint
        run: cargo clippy -- -A warnings

      - name: test
        env:
          AURA_TEST_MODE: interp,compiler
        run: cargo test
